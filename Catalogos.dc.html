<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://use.typekit.net/nac6xjt.css">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #f2ce9d; color: #3f4c76; position: relative; }
    body::before { content: ""; position: fixed; inset: 0; background-image: url('./textures/paper-noise.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; mix-blend-mode: multiply; opacity: 0.4; pointer-events: none; z-index: 1000; }
    ::selection { background: #c2582f; color: #f2ce9d; }
    * { color: inherit; }
    a { color: inherit; text-decoration: none; }
    a:hover { opacity: 0.85; }
    .serif { font-family: 'poster-gothic-atf', sans-serif; font-weight: 600; letter-spacing: 0.09em; }
    .sans { font-family: 'gotham', sans-serif; font-weight: 400; }
    @media (max-width: 900px) {
      .cat-layout { grid-template-columns: 1fr !important; }
      .cat-preview { position: relative !important; height: auto !important; aspect-ratio: 3/4 !important; order: -1; }
      .cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (min-width: 901px) { a:hover .cat-hover-photo { opacity: 1 !important; } }
  </style>
</helmet>

<div class="sans" style="width:100%;overflow-x:hidden;min-height:100vh;box-sizing:border-box;">

  <nav style="position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px clamp(20px,4vw,48px);background:rgba(242,206,157,0.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(36,31,26,0.1);">
    <a href="./Artesaos da Mata Sul.dc.html" class="serif" style="font-size:13px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.75;transition:opacity 0.15s ease;" style-hover="opacity:1;">← Voltar ao site</a>
    <span class="serif" style="font-size:16px;letter-spacing:0.1em;">catálogos</span>
  </nav>

  <div style="max-width:1400px;margin:0 auto;padding:48px clamp(20px,4vw,48px) 90px;">
    <div class="cat-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px;">
      <sc-for list="{{ artisans }}" as="a" hint-placeholder-count="18">
        <a href="{{ a.tapHref }}" target="_blank" rel="noopener" onClick="{{ a.onTap }}" style="display:flex;flex-direction:column;gap:10px;">
          <div class="cat-card" style="width:100%;aspect-ratio:3/4;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(63,76,118,0.15);background:#e8bd82;position:relative;">
            <img src="{{ a.cover }}" alt="{{ a.name }}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy">
            <sc-if value="{{ a.hasPhoto }}" hint-placeholder-val="{{ false }}">
              <img ref="{{ a.photoRef }}" alt="{{ a.brandOrName }}" class="cat-hover-photo" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:{{ a.previewOpacity }};transition:opacity 0.3s ease;">
            </sc-if>
            <sc-if value="{{ a.hasVideo }}" hint-placeholder-val="{{ false }}">
              <video src="{{ a.video }}" muted="" loop="" playsinline="" preload="none" class="cat-hover-photo" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:{{ a.previewOpacity }};transition:opacity 0.3s ease;"></video>
            </sc-if>
          </div>
          <span class="serif" style="font-size:16px;line-height:1.15;font-weight:600;">{{ a.name }}</span>
        </a>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { hoverIndex: null, tappedIndex: null };

  photoRefs = {};
  photoRef = (i) => (el) => {
    this.photoRefs[i] = el;
    if (el && this.artisansData[i] && el.src !== new URL(this.artisansData[i].photo, window.location.href).href) {
      el.src = this.artisansData[i].photo;
    }
  };

  tapCard = (i) => (e) => {
    if (window.matchMedia('(min-width: 901px)').matches) return;
    if (this.state.tappedIndex !== i) { e.preventDefault(); this.setState({ tappedIndex: i }); }
    else { this.setState({ tappedIndex: null }); }
  };

  artisansData = [
    { name: 'Jorgeogue', cover: './catalogos/jorgeogue.jpg', photo: './catalogos/jorgeogue_photo.jpg', card: './catalogos/jorgeogue.html', desc: 'O Nascimento das Tartarugas — esculturas em durepox que exploram imaginário, sonhos e arqueologia.' },
    { name: 'Lia Paula', brand: 'Fruto do Mangue', cover: './catalogos/liapaula.jpg', photo: './catalogos/liapaula_photo.jpg', card: './catalogos/liapaula.html', desc: 'Fruto do Mangue — mesa posta em crochê de palha de bananeira que veste a comida regional do restaurante.' },
    { name: 'Marcos Rogério', brand: 'Madeiarte', cover: './catalogos/marcos.jpg', photo: './catalogos/marcos_photo.jpg', card: './catalogos/marcos.html', desc: 'Casa Mangue — móveis e objetos em madeira onde o emaranhado dos galhos do mangue atravessa a estrutura.' },
    { name: 'Carol Wanderley', cover: './catalogos/carol.jpg', photo: './catalogos/carol_photo.jpg', card: './catalogos/carol_fullbleed.html', desc: 'Quadradinho da Vovó — crochê que leva o ponto da avó para bolsas, jogos e quadros de parede.' },
    { name: 'Mestre Sandro', cover: './catalogos/sandro.jpg', photo: './catalogos/sandro_photo.jpg', card: './catalogos/sandro.html', desc: 'A Feira — esculturas em madeira que homenageiam as frutas e memórias da feira de Tamandaré.' },
    { name: 'Karlise custódio', cover: './catalogos/karlise.jpg', photo: './catalogos/karlise_photo.jpg', card: './catalogos/karlise.html', desc: 'Xiquitita — bolsas e acessórios em xita e palha que celebram as festas populares de Pernambuco.' },
    { name: 'Ivonete da Silva', brand: 'Verete', cover: './catalogos/ivonete.jpg', photo: './catalogos/ivonete_photo.jpg', card: './catalogos/ivonete.html', desc: 'O Coqueiro Que Me Refresca — bolsas para o dia a dia, praia e passeio, feitas para durar.' },
    { name: 'Claudia de Souza', brand: 'Scamarts', cover: './catalogos/claudia.jpg', photo: './catalogos/claudia_photo.jpg', card: './catalogos/claudia_fullbleed.html', desc: 'Nas Areias de Porto — joias com escama de peixe que unem mar e brilho há 20 anos.' },
    { name: 'Edson Júnior', brand: 'Edson Marchetaria', cover: './catalogos/edson.jpg', photo: './catalogos/edson_photo.jpg', card: './catalogos/edson_fullbleed.html', desc: 'Estudo da Forma — esculturas em xiloteca de madeiras brasileiras que reinterpretam os folguedos pernambucanos.' },
    { name: 'Lilly Guignoni', brand: 'Facheiro', cover: './catalogos/lilly.jpg', video: './catalogos/lilly_photo.mp4', card: './catalogos/lilly_fullbleed.html', desc: 'Meu Lugar no Mundo — macramé com miçangas que carrega a ancestralidade pelos territórios que atravessa.' },
    { name: 'Antonio Jandeir', brand: 'Tony Artesão', cover: './catalogos/tony.jpg', photo: './catalogos/tony_photo.jpg', card: './catalogos/tony.html', desc: 'Da Madeira ao Mundo — carros de brinquedo em madeira reaproveitada que atravessam as estradas do Brasil.' },
    { name: 'Cássia Santana', brand: 'Aver O Mar', cover: './catalogos/cassia.jpg', photo: './catalogos/cassia_photo.jpg', card: './catalogos/cassia.html', desc: 'Raízes do Litoral — moda praia inspirada no mangue e na força das mulheres pescadoras de Sirinhaém.' },
    { name: 'Charlie Neves', brand: 'Charlie Neves', cover: './catalogos/charlie.jpg', photo: './catalogos/charlie_photo.jpg', card: './catalogos/charlie.html', desc: 'Devaneio Oceânico — esculturas em madeira com ilusões de ótica e cores neon, inspiradas num oceano imaginário.' },
    { name: 'Cícero Francisco', cover: './catalogos/cicero.jpg', photo: './catalogos/cicero_photo.jpg', card: './catalogos/cicero_fullbleed.html', desc: 'Mangue Vivo — utensílios e utilitários decorativos de coco e madeira que celebram a fauna do mangue.' },
    { name: 'Maré de Sena', cover: './catalogos/anasena.jpg', photo: './catalogos/anasena_photo.jpg', card: './catalogos/anasena_fullbleed.html', desc: 'O Mar em Mim — acessórios em macramé e palha inspirados nas paisagens de Guadalupe.' },
    { name: 'Rosângela Maria', cover: './catalogos/rosangela.jpg', photo: './catalogos/rosangela_photo.jpg', card: './catalogos/rosangela_fullbleed.html', desc: 'Nayara: A Boneca de Tamandaré — a boneca indígena que guarda a memória do povo caeté e protege o mangue.' },
    { name: 'André Santana', cover: './catalogos/andre.jpg', photo: './catalogos/andre_photo.jpg', card: './catalogos/andre_fullbleed.html', desc: 'Aves da Restinga — esculturas de aves nativas feitas com resíduos recolhidos na restinga, sem derrubar nem extrair da natureza.' },
    { name: 'Sandra Moraes', cover: './catalogos/sandra.jpg', photo: './catalogos/sandra_photo.jpg', card: './catalogos/sandra.html', desc: 'Cores do Mangue — o vermelho vivo e o degradê do mangue, em roupas fluidas em materiais naturais.' },
  ];

  resolveCardUrl = (path) => {
    if (!path) return path;
    try {
      const u = new URL(path, window.location.href);
      if (!u.search && window.location.search) u.search = window.location.search;
      return u.href;
    } catch (e) { return path; }
  };

  renderVals() {
    const tappedIndex = this.state.tappedIndex;
    const artisans = this.artisansData.map((a, i) => ({
      ...a, $index: i, card: this.resolveCardUrl(a.card), brandOrName: a.brand || a.name,
      hasPhoto: !!a.photo, hasVideo: !!a.video,
      previewOpacity: tappedIndex === i ? 1 : 0,
      tapHref: this.resolveCardUrl(a.card), onTap: this.tapCard(i), photoRef: this.photoRef(i),
    }));
    return { artisans };
  }
}
</script>
</body>
</html>
